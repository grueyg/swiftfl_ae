use_gpu: True
device: 0
seed: 12345
federate:
  method: IdpSpec
  sampler: spec_opt
  mode: standalone
  total_round_num: 1000
  client_num: 3500
  sample_client_num: 350
  resource_info_file: data/client_device_capacity
  augmentation_factor: 1.0
  merge_test_data: True
  make_global_eval: True
data:
  root: data
  type: femnist
  splits: [0.8,0.0,0.2]
  subsample: 0.33
  transform: [['ToTensor'], ['Normalize', {'mean': [0.9637], 'std': [0.1592]}]]
dataloader:
  batch_size: 20
model:
  type: convnet2
  hidden: 2048
  out_channels: 62
  dropout: 0.5
train:
  local_update_steps: 1
  batch_or_epoch: epoch
  optimizer:
    type: 'SGD'
    lr: 1e-1
grad:
  grad_clip: 5.0
criterion:
  type: CrossEntropyLoss
trainer:
  type: spectrainer
eval:
  best_res_update_round_wise_key: test_acc
  freq: 10
  start_interval_eval_round: 10
  metrics: ['acc', 'correct']
fedopt:
  use: True
  optimizer:
    type: Adam
    lr: 1e-2
    betas: [0.9, 0.99]
    eps: 1e-3
spec:
  use: True
  warm_round: 0
  predict_freq: 1
  do_compensation: True
  overselection: 1.3
  hessian_approx_lambda: 1.0
  normal_spec_lambda: 0.7
  sample_client_rate: 0.1
  sampler: optimal_all
  predictor:
    type: default
    model_type: cv
    model_args: [{"hid_S": 16,
                  "hid_T": 256,
                  "N_S": 4,
                  "N_T": 4,
                  "model_type": 'incepu'}]
    in_channel: 25
    patch_size: 32
    pre_seq_length: 5
    aft_seq_length: 1
    sum_seq_length: 1
    criterion: [{'criterion_type': 'MSELoss'}]
    optimizer: [{'type': 'Adam', 'lr': 0.0001}]
    device: 1
    epochs: 10
    train_size: 0.8
    do_validation: True
    topk: 1.0
